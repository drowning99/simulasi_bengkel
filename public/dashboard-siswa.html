<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siswa - Bengkel Digital</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
  <div class="card">
    <div class="flex-between">
      <h2>🧑‍🔧 Ruang Kerja Teknisi</h2>
      <button onclick="location.href='/api/logout'" class="btn btn-danger">Logout</button>
    </div>
    <p>Selamat datang, <strong id="siswaName"></strong></p>
    <hr />

    <h3>📬 Tugas Masuk</h3>
    <div id="taskList"></div>
    <hr />
    <h3>📊 Riwayat Nilai Saya</h3>
    <div id="myScores"></div>
  </div>
</div>

<script>
  fetch('/api/me')
    .then(r => r.json())
    .then(user => {
      document.getElementById('siswaName').textContent = user.name;
    })
    .catch(() => window.location.href = '/');

  async function loadData() {
    try {
      // Tugas
      const tasksRes = await fetch('/api/tasks');
      const tasks = await tasksRes.json();
      const container = document.getElementById('taskList');
      if (tasks.length === 0) {
        container.innerHTML = '<p class="text-muted">Belum ada tugas dari guru.</p>';
      } else {
        container.innerHTML = tasks.map(t => {
          const status = t.status || 'Belum';
          const disabled = (status === 'reviewed' || status === 'pending') ? 'disabled' : '';
          const btnText = status === 'reviewed' ? '✅ Selesai' : (status === 'pending' ? '⏳ Menunggu Nilai' : '🚀 Kerjakan');
          return `
            <div class="task-item">
              <strong class="task-title">${t.title}</strong>
              <span class="text-muted">Deadline: ${new Date(t.deadline).toLocaleString()}</span>
              <span>Status: ${status}</span>
              ${t.score !== null ? `| Nilai: ${t.score}` : ''}
              <button onclick="openTask('${t.id}')" class="btn btn-secondary" ${disabled}>${btnText}</button>
            </div>
          `;
        }).join('');
      }

      // Riwayat nilai
      const scoreRes = await fetch('/api/my-submissions');
      const scores = await scoreRes.json();
      const scoreDiv = document.getElementById('myScores');
      if (scores.length === 0) {
        scoreDiv.innerHTML = '<p class="text-muted">Belum ada nilai.</p>';
      } else {
        // Ambil judul tugas
        const allTasks = await tasksRes.json();
        scoreDiv.innerHTML = scores.map(s => {
          const task = allTasks.find(t => t.id === s.taskId);
          const title = task ? task.title : 'Tugas (dihapus)';
          return `<div class="score-row"><strong>${title}</strong> | Nilai: ${s.score !== null ? s.score : 'Menunggu'} | Feedback: ${s.feedback || '-'}</div>`;
        }).join('');
      }
    } catch (err) {
      console.error(err);
      document.getElementById('taskList').innerHTML = '<p class="msg-error">❌ Gagal memuat data.</p>';
    }
  }
  loadData();

  window.openTask = async (taskId) => {
    try {
      const res = await fetch(`/api/tasks/${taskId}`);
      const task = await res.json();
      const container = document.getElementById('taskList');
      container.innerHTML = `
        <button onclick="loadData()" class="btn btn-secondary">⬅ Kembali</button>
        <div class="task-detail">
          <h3>${task.title}</h3>
          <p><strong>Deskripsi:</strong></p>
          <p>${task.description}</p>
          <p><strong>Deadline:</strong> ${new Date(task.deadline).toLocaleString()}</p>
          ${task.fileRef ? `<a href="/uploads/${task.fileRef}" target="_blank" class="link">📎 Lihat Referensi</a>` : ''}
          <hr />
          <h4>Kumpulkan Jawaban</h4>
          <form id="submitForm" enctype="multipart/form-data">
            <div class="form-group">
              <label>Jawaban Teks</label>
              <textarea name="textAnswer" placeholder="Tulis langkah-langkah diagnosis..." rows="4"></textarea>
            </div>
            <div class="form-group">
              <label>Unggah Foto/Sketsa (opsional)</label>
              <input type="file" name="file" accept="image/*,application/pdf" />
            </div>
            <input type="hidden" name="taskId" value="${taskId}" />
            <button type="submit" class="btn btn-primary">Kumpulkan</button>
          </form>
          <div id="submitMsg" class="msg-error"></div>
        </div>
      `;
      document.getElementById('submitForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const msg = document.getElementById('submitMsg');
        msg.textContent = 'Mengirim...';
        msg.style.color = 'white';
        try {
          const res = await fetch('/api/submissions', { method: 'POST', body: formData });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Gagal');
          msg.style.color = '#2ecc71';
          msg.textContent = '✅ Jawaban terkirim!';
          setTimeout(() => loadData(), 1500);
        } catch (err) {
          msg.style.color = '#e74c3c';
          msg.textContent = '❌ ' + err.message;
        }
      });
    } catch (err) {
      alert('Gagal memuat detail tugas.');
    }
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Bengkel Digital</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
  <div class="card">
    <h1>🔧 Bengkel Digital SMK</h1>
    <p class="subtitle">Simulasi Dunia Kerja - TKR</p>
    <hr />
    <form id="loginForm">
      <div class="form-group">
        <label for="username">ID Pengguna</label>
        <input type="text" id="username" placeholder=>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Masukkan password" required />
      </div>
      <button type="submit" class="btn btn-primary full">Masuk</button>
      <div id="loginMsg" class="msg-error"></div>
    </form>
    <p class="text-center">
      Belum punya akun? <a href="/register" class="link">Daftar di sini</a>
    </p>
  </div>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const msg = document.getElementById('loginMsg');
    msg.textContent = '';
    msg.style.color = '#e74c3c';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login gagal');
      window.location.href = data.role === 'guru' ? '/guru' : '/siswa';
    } catch (err) {
      msg.textContent = '❌ ' + err.message;
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guru - Bengkel Digital</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
  <div class="card">
    <div class="flex-between">
      <h2>👨‍🏫 Dashboard Kepala Bengkel</h2>
      <button onclick="location.href='/api/logout'" class="btn btn-danger">Logout</button>
    </div>
    <p>Selamat datang, <strong id="guruName"></strong></p>
    <hr />

    <h3>📝 Buat Tugas Baru</h3>
    <form id="createTaskForm" enctype="multipart/form-data">
      <div class="form-group">
        <label>Judul Tugas</label>
        <input type="text" name="title" placeholder="Contoh: Diagnosa Mesin Overheat" required />
      </div>
      <div class="form-group">
        <label>Deskripsi Kasus</label>
        <textarea name="description" placeholder="Jelaskan kasus dan pertanyaan untuk siswa" rows="4" required></textarea>
      </div>
      <div class="form-group">
        <label>Deadline</label>
        <input type="datetime-local" name="deadline" required />
      </div>
      <div class="form-group">
        <label>Upload Gambar Referensi (opsional)</label>
        <input type="file" name="file" accept="image/*,application/pdf" />
      </div>
      <button type="submit" class="btn btn-primary">Kirim Tugas</button>
      <div id="taskMsg" class="msg-error"></div>
    </form>
    <hr />

    <h3>📋 Daftar Tugas & Jawaban Siswa</h3>
    <div id="taskList"></div>
  </div>
</div>

<script>
  // Ambil data user
  fetch('/api/me')
    .then(r => r.json())
    .then(user => {
      document.getElementById('guruName').textContent = user.name;
    })
    .catch(() => window.location.href = '/');

  async function loadTasks() {
    try {
      const res = await fetch('/api/tasks');
      const tasks = await res.json();
      const container = document.getElementById('taskList');
      if (tasks.length === 0) {
        container.innerHTML = '<p class="text-muted">Belum ada tugas. Buat tugas baru di atas!</p>';
        return;
      }
      container.innerHTML = tasks.map(t => `
        <div class="task-item">
          <strong class="task-title">${t.title}</strong>
          <span class="text-muted">Deadline: ${new Date(t.deadline).toLocaleString()}</span>
          ${t.fileRef ? `<a href="/uploads/${t.fileRef}" target="_blank" class="link">📎 Lihat Referensi</a>` : ''}
          <button onclick="viewSubmissions('${t.id}')" class="btn btn-secondary">Lihat Jawaban</button>
        </div>
      `).join('');
    } catch (err) {
      console.error(err);
    }
  }
  loadTasks();

  // Buat tugas
  document.getElementById('createTaskForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const msg = document.getElementById('taskMsg');
    msg.textContent = 'Mengirim...';
    msg.style.color = 'white';
    try {
      const res = await fetch('/api/tasks', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Gagal');
      msg.style.color = '#2ecc71';
      msg.textContent = '✅ Tugas berhasil dibuat!';
      setTimeout(() => location.reload(), 1500);
    } catch (err) {
      msg.style.color = '#e74c3c';
      msg.textContent = '❌ ' + err.message;
    }
  });

  // Lihat submissions
  window.viewSubmissions = async (taskId) => {
    try {
      const res = await fetch(`/api/submissions/task/${taskId}`);
      const subs = await res.json();
      const container = document.getElementById('taskList');
      if (subs.length === 0) {
        alert('Belum ada siswa mengumpulkan.');
        return;
      }
      let html = `<button onclick="loadTasks()" class="btn btn-secondary">⬅ Kembali</button>
                  <h4>📥 Jawaban Siswa</h4>`;
      subs.forEach(s => {
        const reviewed = s.status === 'reviewed';
        html += `
          <div class="submission-item">
            <strong>${s.studentName}</strong> 
            <span class="status ${reviewed ? 'reviewed' : 'pending'}">${reviewed ? '✅ Dinilai' : '⏳ Menunggu'}</span>
            <p><strong>Jawaban:</strong> ${s.textAnswer || '-'}</p>
            ${s.filePath ? `<a href="/uploads/${s.filePath}" target="_blank" class="link">📎 Lihat File</a>` : ''}
            ${reviewed ? `
              <div class="feedback-box">
                <strong>Nilai:</strong> ${s.score} | <strong>Feedback:</strong> ${s.feedback || '-'}
              </div>
            ` : `
              <form onsubmit="gradeSubmission(event, '${taskId}', '${s.studentId}')" class="grade-form">
                <input type="number" name="score" placeholder="Nilai (0-100)" required />
                <input type="text" name="feedback" placeholder="Feedback..." />
                <button type="submit" class="btn btn-primary">Beri Nilai</button>
              </form>
            `}
          </div>
        `;
      });
      container.innerHTML = html;
    } catch (err) {
      alert('Gagal memuat jawaban.');
    }
  };

  // Fungsi memberi nilai
  window.gradeSubmission = async (e, taskId, studentId) => {
    e.preventDefault();
    const form = e.target;
    const score = form.score.value;
    const feedback = form.feedback.value;
    const btn = form.querySelector('button');
    btn.textContent = 'Menyimpan...';
    btn.disabled = true;
    try {
      const res = await fetch('/api/submissions/grade', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ taskId, studentId, score, feedback })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Gagal');
      alert('✅ ' + data.message);
      viewSubmissions(taskId);
    } catch (err) {
      alert('❌ ' + err.message);
      btn.textContent = 'Beri Nilai';
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
